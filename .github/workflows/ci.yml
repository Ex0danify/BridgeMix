name: CI

# Run the test suite on every push and pull request.
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Versions with prebuilt python-rtmidi / PyQt6 wheels (see setup.sh).
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # PyQt6 dlopens these even under the offscreen platform plugin.
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      - name: Install BridgeMix (with dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov

      - name: Run tests
        env:
          QT_QPA_PLATFORM: offscreen   # no display server on the runner
        run: pytest -q --cov=bridgemix --cov-report=term-missing
