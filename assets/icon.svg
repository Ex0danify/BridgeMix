<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c21"/>
      <stop offset="100%" stop-color="#0e0e0f"/>
    </linearGradient>
    <linearGradient id="active1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e05c12"/>
      <stop offset="100%" stop-color="#c84e0e"/>
    </linearGradient>
    <radialGradient id="knob1" cx="40%" cy="35%">
      <stop offset="0%"   stop-color="#f5742a"/>
      <stop offset="100%" stop-color="#b84000"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle inner border -->
  <rect x="1" y="1" width="510" height="510" rx="95.5"
        fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.06"/>

  <!-- ── Fader 1 — orange, knob at 58% ───────────────────────────── -->
  <!-- Track -->
  <rect x="64" y="171" width="384" height="34" rx="17" fill="#1e1e23"/>
  <!-- Active fill -->
  <rect x="64" y="171" width="223" height="34" rx="17" fill="url(#active1)"/>
  <!-- Knob glow -->
  <circle cx="287" cy="188" r="66" fill="#e05c12" opacity="0.22" filter="url(#glow)"/>
  <!-- Knob body -->
  <circle cx="287" cy="188" r="54" fill="url(#knob1)"/>
  <!-- Knob rim -->
  <circle cx="287" cy="188" r="54" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.15"/>
  <!-- Knob centre line (position indicator) -->
  <line x1="287" y1="148" x2="287" y2="168" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.85"/>

  <!-- ── Fader 2 — grey, knob at 22% ─────────────────────────────── -->
  <!-- Track -->
  <rect x="64" y="307" width="384" height="34" rx="17" fill="#1e1e23"/>
  <!-- Active fill -->
  <rect x="64" y="307" width="85"  height="34" rx="17" fill="#35353c"/>
  <!-- Knob body -->
  <circle cx="149" cy="324" r="54" fill="#2e2e34"/>
  <!-- Knob rim -->
  <circle cx="149" cy="324" r="54" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.08"/>
  <!-- Knob centre line -->
  <line x1="149" y1="284" x2="149" y2="304" stroke="#ffffff" stroke-width="7" stroke-linecap="round" opacity="0.25"/>
</svg>
